# build.yaml
# Configuration for build_runner code generation

targets:
  $default:
    builders:
      # Auto Route configuration for type-safe navigation
      auto_route_generator:
        enabled: true
        # generate_for:
        #   - lib/core/router/app_router.dart
        options:
          # Generate route names as constants
          generate_route_names: true
          # Enable route parameter validation
          generate_route_helper: true
          # Optimize route generation for better performance
          replace_in_router_name: true
          # Generate path helper methods
          generate_path_helpers: true

      # Injectable configuration for dependency injection
      injectable_generator:
        enabled: true
        generate_for:
          - lib/**/*.dart
        options:
          # Auto register discovered dependencies
          auto_register: true
          # Generate module imports
          generate_for_dir: lib

      # Freezed configuration for immutable data classes
      freezed:
        options:
          union_key: type
          union_value_case: pascal
          # Enable map generation for better debugging
          map: true
          # Generate copyWith methods
          copyWith: true

      # JSON Annotation for API models
      json_annotation:
        enabled: true
        generate_for:
          - lib/features/*/data/models/*_model.dart
          - lib/core/network/models/*_model.dart
        options:
          # Generate nullable-aware code
          nullable: true
          # Use explicit to/from JSON methods
          explicit_to_json: true

      # Flutter Gen - DISABLED due to version conflicts
      # Uncomment when version compatibility is resolved
      # flutter_gen_runner:
      #   options:
      #     output: lib/build_gen/
      #     line_length: 120

      # Hive CE generator for local storage models
      hive_ce_generator:
        enabled: true
        generate_for:
          - lib/features/*/data/models/*_hive_model.dart
          - lib/core/storage/models/*_hive_model.dart
        options:
          # Ensure type adapters are generated with proper naming
          type_adapter_suffix: Adapter

# Global build configuration optimized for Auto Route
global_options:
  # Build runner optimization settings
  build_runner:
    # Performance optimizations for development builds
    options:
      # Delete conflicting outputs automatically
      delete_conflicting_outputs: true
      # Skip expensive file system watching optimizations
      skip_build_script: false
