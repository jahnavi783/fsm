name: fsm
description: "FSM (Field Service Management) Mobile Application"

publish_to: 'none'

version: 2.0.5+5

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Dependency Injection
  injectable: ^2.5.2
  get_it: ^8.2.0

  # Routing
  auto_route: ^9.3.0

  # Network
  dio: ^5.9.0
  retrofit: ^4.7.3
  pretty_dio_logger: ^1.4.0
  dio_smart_retry: ^7.0.1

  # Data Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Functional Programming
  either_dart: ^1.0.0

  # Location & Maps
  location: ^8.0.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # Media & Files
  image_picker: ^1.2.0
  file_picker: ^10.3.3
  permission_handler: ^12.0.1

  # UI Components
  flutter_screenutil: ^5.9.3
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Forms
  reactive_forms: ^18.1.1

  # Documents
  syncfusion_flutter_pdfviewer: ^31.1.23

  # Calendar
  calendar_view: ^1.4.0

  # Utils
  intl: ^0.20.2
  connectivity_plus: ^7.0.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  auto_route_generator: ^9.0.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  retrofit_generator: ^8.2.1
  # flutter_gen_runner: ^5.4.0  # Temporarily disabled due to version conflict

  # Testing
  mockito: ^5.4.4
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter.ttf
          style: normal

flutter_gen:
  output: lib/gen/
  line_length: 80

  integrations:
    flutter_svg: true

  assets:
    enabled: true
    outputs:
      class_name: Assets

  fonts:
    enabled: true

  colors:
    enabled: true
